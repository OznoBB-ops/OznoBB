port: 7890
socks-port: 7891
allow-lan: false
mode: rule
log-level: info
external-controller: 127.0.0.1:9090

proxy-groups:
  - name: PROXY
    type: select
    proxies:
      - auto
      - DIRECT
    use:
      - merged-sub
  - name: auto
    type: url-test
    url: http://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 50
    use:
      - merged-sub
  - name: TORRENT
    type: select
    proxies:
      - auto-torrent
      - DIRECT
    use:
      - merged-sub
  - name: auto-torrent
    type: url-test
    url: http://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 100
    use:
      - merged-sub
  - name: TELEGRAM
    type: select
    proxies:
      - auto
      - DIRECT
    use:
      - merged-sub
  - name: PERSONAL24
    type: select
    proxies:
      - auto
      - DIRECT
    use:
      - merged-sub

proxy-providers:
  merged-sub:
    type: http
    url: https://raw.githubusercontent.com/OznoBB-ops/OznoBB/main/clash/output/proxies.txt
    path: ./proxy_providers/merged-sub.yml
    interval: 3600
    health-check:
      enable: true
      url: http://cp.cloudflare.com/generate_204
      interval: 600

rule-providers:
  ru-bundle:
    type: http
    url: https://github.com/legiz-ru/mihomo-rule-sets/raw/main/ru-bundle/rule.yaml
    interval: 86400
    behavior: domain
    format: yaml
  ru-custom:
    type: http
    url: https://raw.githubusercontent.com/legiz-ru/mihomo-rule-sets/main/ru-custom/rule.yaml
    interval: 86400
    behavior: domain
    format: yaml
  torrent-clients:
    type: http
    url: https://raw.githubusercontent.com/legiz-ru/mihomo-rule-sets/refs/heads/main/other/torrent-clients.yaml
    interval: 86400
    behavior: classical
    format: yaml
  torrent-trackers:
    type: http
    url: https://github.com/legiz-ru/mihomo-rule-sets/raw/main/other/torrent-trackers.mrs
    interval: 86400
    behavior: domain
    format: mrs
    path: ./rule-sets/torrent-trackers.mrs
  telegram:
    type: http
    url: https://raw.githubusercontent.com/legiz-ru/mihomo-rule-sets/main/telegram/rule.yaml
    interval: 86400
    behavior: domain
    format: yaml
  personal24:
    type: http
    url: https://raw.githubusercontent.com/legiz-ru/mihomo-rule-sets/main/personal-24/rule.yaml
    interval: 86400
    behavior: domain
    format: yaml
  skrepysh-proxy:
    type: http
    url: https://github.com/Skrepysh/mihomo-rulesets/raw/refs/heads/main/skrepysh-rulesets/skrepysh-proxy.yaml
    interval: 86400
    behavior: classical
    format: yaml

rules:
  - RULE-SET,torrent-clients,TORRENT
  - RULE-SET,torrent-trackers,TORRENT
  - RULE-SET,telegram,TELEGRAM
  - RULE-SET,personal24,PERSONAL24
  - RULE-SET,ru-bundle,DIRECT
  - RULE-SET,ru-custom,DIRECT
  - RULE-SET,skrepysh-proxy,PROXY
  - MATCH,PROXY
