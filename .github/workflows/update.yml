name: Build Proxies

on:
  schedule:
    - cron: '0 */6 * * *'  # Каждые 6 часов
  push:
    branches:
      - main
  workflow_dispatch:  # Запуск вручную через UI

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install requests
      
      - name: Run build script
        run: python scripts/build.py
      
      - name: Check what was generated
        run: |
          echo "=== Files in subscription/ ==="
          ls -lah subscription/
          echo "=== First 5 lines of subscription.txt ==="
          head -5 subscription/subscription.txt || echo "File not found!"
      
      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add subscription/
          git diff --cached --quiet || (git commit -m "Update proxies: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" && git push)
