- name: Run build script
  run: python scripts/build.py

- name: Check what was generated
  run: |
    echo "=== Files in subscription/ ==="
    ls -lah subscription/
    echo "=== Content of subscription.txt (first 10 lines) ==="
    head -10 subscription/subscription.txt || echo "File not found!"

- name: Commit and push changes
  run: |
    git config user.name "github-actions[bot]"
    git config user.email "github-actions[bot]@users.noreply.github.com"
    git add -A
    git status
    echo "=== Git status ==="
    git diff --cached
    if git diff --quiet && git diff --cached --quiet; then
      echo "No changes to commit"
    else
      git commit -m "Update proxies: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
      git push
      echo "✓ Pushed successfully"
    fi
