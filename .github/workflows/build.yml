name: Build Clash & Sing-box & Exclave Configs

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repo
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r clash/requirements.txt
        pip install -r singbox/requirements.txt
        
    - name: Run Clash build script
      run: python clash/build_clash.py
      
    - name: Run Sing-box build script
      run: python singbox/build_singbox.py
      
    - name: Commit and push
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add clash/output/ singbox/output/ || true
        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          git commit -m "Auto-update configs $(date -u '+%Y-%m-%d %H:%M:%S')"
          git push
        fi
